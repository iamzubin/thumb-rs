name: Windows Thumbnail Test

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-vlc-icon:
    name: Extract VLC icon thumbnail
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --example cli

      - name: Extract thumbnails at various scales
        run: |
          cargo run --example cli -- vlc.exe --scale 1 --output vlc_thumb_1x.png
          cargo run --example cli -- vlc.exe --scale 2 --output vlc_thumb_2x.png
          cargo run --example cli -- vlc.exe --scale 4 --output vlc_thumb_4x.png

      - name: Upload thumbnails
        uses: actions/upload-artifact@v4
        with:
          name: vlc-thumbnails
          path: vlc_thumb_*.png
