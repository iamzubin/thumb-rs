name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --lib --target aarch64-apple-darwin || true
        continue-on-error: true
      - run: cargo check --lib --target x86_64-pc-windows-gnu || true
        continue-on-error: true

  macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo clippy -- -D warnings
      - run: cargo test

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - name: Generate test thumbnails
        run: |
          # Create a test image using PowerShell
          Add-Type -AssemblyName System.Drawing
          $bmp = New-Object System.Drawing.Bitmap(800, 600)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.Clear([System.Drawing.Color]::FromArgb(100, 150, 200))
          $bmp.Save("test_image.png", [System.Drawing.Imaging.ImageFormat]::Png)
          $g.Dispose()
          $bmp.Dispose()

          # Run the CLI example (use absolute paths for Windows compatibility)
          $img = Join-Path $PWD "test_image.png"
          cargo run --example cli -- $img --scale 1
          cargo run --example cli -- "$env:SystemRoot\System32\notepad.exe" --scale 1
      - name: Upload thumbnails
        uses: actions/upload-artifact@v4
        with:
          name: windows-thumbnails
          path: "*_thumb.png"
          if-no-files-found: warn
